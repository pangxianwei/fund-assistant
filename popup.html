<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基金助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 560px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .market-section,
    .search-box {
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }

    .market-section {
      padding: 10px 12px 8px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
    }

    .section-tip {
      font-size: 11px;
      color: #6b7280;
    }

    .market-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .market-card {
      padding: 8px 10px;
      border: 1px solid #e7ebf3;
      border-radius: 10px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.08);
    }

    .market-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }

    .market-name,
    .fund-name {
      font-size: 15px;
      font-weight: 700;
      color: #1f2937;
    }

    .market-code,
    .fund-code {
      color: #9ca3af;
      font-size: 12px;
      margin-top: 2px;
    }

    .market-update {
      color: #9ca3af;
      font-size: 11px;
      white-space: nowrap;
    }

    .market-price {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .market-change {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .market-meta {
      font-size: 12px;
      color: #6b7280;
    }

    .search-box {
      padding: 12px;
    }

    .input-group {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
    }

    button {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s ease, opacity 0.2s ease, transform 0.18s ease;
    }

    button:hover {
      background: #5568d3;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.72;
      transform: none;
    }

    .secondary-btn {
      background: #e8eefc;
      color: #3b5bdb;
    }

    .secondary-btn:hover {
      background: #dbe5ff;
    }

    .fund-list {
      max-height: none;
      overflow-y: visible;
      padding: 6px 0 8px;
    }

    .fund-item {
      background: white;
      padding: 12px;
      margin: 0 12px 8px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      border: 1px solid #eef2f7;
    }

    .fund-code {
      margin-bottom: 8px;
    }

    .fund-info {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      font-size: 13px;
    }

    .info-item {
      display: flex;
      justify-content: flex-start;
      padding: 2px 0;
      gap: 4px;
    }

    .info-label {
      color: #6b7280;
      min-width: 52px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .info-value {
      font-weight: 700;
      color: #1f2937;
      white-space: nowrap;
    }

    .positive {
      color: #e53e3e;
    }

    .negative {
      color: #16a34a;
    }

    .neutral {
      color: #4b5563;
    }

    .delete-btn {
      background: #fc8181;
      padding: 6px 12px;
      font-size: 12px;
      margin-top: 8px;
      width: 100%;
    }

    .delete-btn:hover {
      background: #f56565;
    }

    .empty,
    .loading,
    .error {
      text-align: center;
      padding: 16px;
    }

    .empty {
      color: #9ca3af;
    }

    .loading {
      color: #667eea;
    }

    .error {
      color: #e53e3e;
    }

    .market-grid .loading,
    .market-grid .error {
      grid-column: 1 / -1;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="header">基金助手</div>

  <div class="market-section">
    <div class="section-header">
      <span class="section-title">实时大盘</span>
      <span class="section-tip">每15秒刷新</span>
    </div>
    <div id="marketIndexes" class="market-grid">
      <div class="loading">大盘加载中...</div>
    </div>
  </div>

  <div class="search-box">
    <div class="input-group">
      <input type="text" id="fundCode" placeholder="输入基金代码（如：000001）" />
      <button id="addBtn">添加</button>
      <button id="refreshBtn" class="secondary-btn">刷新</button>
    </div>
  </div>

  <div id="fundList" class="fund-list">
    <div class="empty">还没有添加基金，输入代码开始吧</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
